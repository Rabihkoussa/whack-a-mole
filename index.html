<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        h1 { color: #333; margin-bottom: 20px; }
        
        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .info div { font-size: 20px; font-weight: bold; }
        
        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        button:hover { background: #764ba2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #gameBoard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .hole {
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, #8B7355, #3E2723);
            border: 5px solid #5D4037;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.4);
        }
        
        .hole:active { transform: scale(0.95); }
        
        .hole img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            display: none;
            animation: popUp 0.3s ease-out;
        }
        
        .hole.active img { display: block; }
        .hole.hit img { animation: smash 0.5s ease-out forwards; }
        
        @keyframes popUp {
            from { transform: scale(0.3); }
            to { transform: scale(1); }
        }
        
        @keyframes smash {
            to { transform: scale(0.5) rotate(-20deg); opacity: 0; }
        }
        
        #gameOver {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #ffeaa7;
            border-radius: 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔨 Whack-a-Mole 🔨</h1>
        
        <div class="info">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="time">30</span>s</div>
            <div>Hits: <span id="hits">0</span></div>
        </div>
        
        <button onclick="startGame()" id="startBtn">Start Game</button>
        
        <div id="gameBoard">
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
            <div class="hole"><img src="mole.png" alt="mole"></div>
        </div>
        
        <div id="gameOver"></div>
    </div>
    
    <script>
        let score = 0, hits = 0, timeLeft = 30, gameActive = false, currentMoleIndex = -1;
        const holes = document.querySelectorAll('.hole');
        
        function startGame() {
            score = hits = 0;
            timeLeft = 30;
            gameActive = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('score').textContent = score;
            document.getElementById('hits').textContent = hits;
            document.getElementById('time').textContent = timeLeft;
            
            holes.forEach((hole, i) => hole.onclick = () => whackMole(i));
            
            setInterval(() => {
                if (gameActive) {
                    timeLeft--;
                    document.getElementById('time').textContent = timeLeft;
                    if (timeLeft <= 0) endGame();
                }
            }, 1000);
            
            spawnMole();
        }
        
        function spawnMole() {
            if (!gameActive) return;
            if (currentMoleIndex !== -1) holes[currentMoleIndex].classList.remove('active');
            currentMoleIndex = Math.floor(Math.random() * 9);
            holes[currentMoleIndex].classList.add('active');
            setTimeout(() => gameActive && spawnMole(), 800);
        }
        
        function whackMole(i) {
            if (!gameActive || i !== currentMoleIndex) return;
            score += 10;
            hits++;
            document.getElementById('score').textContent = score;
            document.getElementById('hits').textContent = hits;
            holes[i].classList.add('hit');
            holes[i].classList.remove('active');
            currentMoleIndex = -1;
            setTimeout(() => { holes[i].classList.remove('hit'); spawnMole(); }, 500);
        }
        
        function endGame() {
            gameActive = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('gameOver').innerHTML = `<strong>Game Over!</strong><br>Final Score: ${score} | Hits: ${hits}`;
        }
    </script>
</body>
</html>
